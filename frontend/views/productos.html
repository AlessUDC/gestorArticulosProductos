<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="stylesheet" href="../styles/productos.css">
</head>

<body>
    <div class="contenedor">
        <!-- ── Sidebar ── -->
        <aside class="sidebar">
            <h2>Sistema Académico</h2>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="productos.html" class="nav-active">Productos</a></li>
            </ul>
        </aside>

        <!-- ── Contenido principal ── -->
        <main class="contenido">

            <!-- FORMULARIO -->
            <div class="panel prod-form-panel">
                <div class="prod-form-header">
                    <h2 id="formTitulo">Nuevo Producto</h2>
                    <button id="btnCancelar" class="btn-cancelar-form" onclick="cancelarEdicion()"
                        style="display:none;">
                        ✕ Cancelar
                    </button>
                </div>

                <input type="hidden" id="idProducto">

                <div class="prod-form-grid">
                    <div class="form-group">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="Nombre del producto">
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <input type="text" id="categoria" placeholder="Ej: Electrónica, Ropa…">
                    </div>

                    <div class="form-group prod-full-col">
                        <label for="descripcion">Descripción</label>
                        <textarea id="descripcion" rows="3" placeholder="Descripción del producto"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="precio">Precio (S/.)</label>
                        <input type="number" id="precio" min="0" step="0.01" placeholder="0.00">
                    </div>

                    <div class="form-group prod-full-col">
                        <label for="imagenUrl">URL de imagen</label>
                        <input type="url" id="imagenUrl" placeholder="https://…">
                    </div>

                    <!-- Preview de imagen -->
                    <div class="prod-preview-wrap prod-full-col" id="previewWrap" style="display:none;">
                        <img id="imgPreview" src="" alt="Vista previa">
                    </div>
                </div>

                <div class="prod-form-actions">
                    <button id="btnGuardar" onclick="guardarProducto()">💾 Guardar Producto</button>
                </div>
            </div>

            <!-- LISTADO -->
            <div class="panel prod-list-panel">
                <div class="prod-list-header">
                    <h2>Listado de Productos</h2>
                    <input type="text" id="buscador" placeholder="🔍 Buscar por nombre o categoría…"
                        oninput="filtrarProductos()" class="prod-buscador">
                </div>

                <!-- Grid de tarjetas -->
                <div id="productosGrid" class="prod-grid"></div>

                <!-- Mensaje vacío -->
                <p id="mensajeVacio" class="prod-empty" style="display:none;">
                    No hay productos registrados aún.
                </p>
            </div>

        </main>
    </div>

    <script src="../js/productos.js"></script>
</body>

</html>
